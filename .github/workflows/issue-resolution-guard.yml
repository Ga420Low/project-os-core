name: Issue Resolution Guard

on:
  issues:
    types: [edited, closed]

jobs:
  validate-resolution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - id: validate
        name: Validate reserved resolution sections
        continue-on-error: true
        run: python .github/scripts/validate_issue_resolution.py --event-path "$GITHUB_EVENT_PATH"

      - name: Comment on invalid issue closure
        if: steps.validate.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: "Issue closure blocked: fill the reserved sections `Description`, `Impact`, `Root Cause`, `Resolution`, `Regression Coverage`, `Durable Lesson`, `Reusable Pattern`, and `Eval Scenario` before closing."
            });

      - name: Fail when reserved sections are incomplete
        if: steps.validate.outcome == 'failure'
        run: exit 1
